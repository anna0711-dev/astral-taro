                });
            });
            SUITS.forEach(s => {
                s.meanings.forEach((m, i) => {
                    TAROT_CARDS.push({
                        id: id++,
                        name: `${RANKS[i]} ${s.name}`,
                        arcana: `Малка Аркана · ${s.name}`,
                        symbol: s.symbol,
                        meaning: m,
                        reversedMeaning: SUITS_REVERSED[s.name][i]
                    });
                });
            });
        })();

            const [credits, setCredits] = useState(3);
            const [question, setQuestion] = useState("");
            const [readingType, setReadingType] = useState("3_cards");
            const [drawnCards, setDrawnCards] = useState([]);
            const [isFlipped, setIsFlipped] = useState([false, false, false]);
            const [loading, setLoading] = useState(false);

            const [aiError, setAiError] = useState(null);
            const [aiReading, setAiReading] = useState(null);
            const [showPricingModal, setShowPricingModal] = useState(false);

                if (!question.trim()) {
                    alert("Моля, въведете вашия въпрос към картите!");
                    return;
                }
                if (credits <= 0) {
                    setShowPricingModal(true);
                    return;
                }

                setLoading(true);
                setDrawnCards([]);
                setIsFlipped([false, false, false]);
                setAiReading(null);
                setAiError(null);

                setTimeout(() => {
                    const count = readingType === "1_card" ? 1 : 3;
                    const shuffled = [...TAROT_CARDS].sort(() => 0.5 - Math.random());
                    const selected = shuffled.slice(0, count).map(card => ({
                        ...card,
                        reversed: Math.random() < 0.5
                    }));

                    setDrawnCards(selected);
                    setCredits(prev => prev - 1);
                    setLoading(false);

                    selected.forEach((_, idx) => {
                        setTimeout(() => {
                            setIsFlipped(prev => {
                                const next = [...prev];
                                next[idx] = true;
                                return next;
                            });
                        }, (idx + 1) * 600);
                    });

                    setTimeout(() => {
                        generateAiResponse(selected, question, readingType);
                    }, count * 600 + 400);
                }, 1200);
            };

            const generateAiResponse = async (cards, userQ, type) => {
                setAiLoading(true);
                setAiError(null);

                const positions = type === "1_card"
                    ? ["Отговор"]
                    : ["Минало (Основа)", "Настояще (Предизвикателство)", "Бъдеще (Резултат)"];

                const nameWithOrient = (c) => c ? `${c.name}${c.reversed ? " (обърната)" : ""}` : "";

                const cardList = cards.map((c, i) => {
                    const orient = c.reversed ? "ОБЪРНАТА" : "изправена";
                    const mean = c.reversed ? c.reversedMeaning : c.meaning;
                    return `${i + 1}. Позиция „${positions[i]}" — Карта: ${c.name} (${c.arcana}) [${orient}]. Значение: ${mean}`;
                }).join("\n");

                try {
                    const res = await fetch(WORKER_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ question: userQ, type, cards }),
                    });
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    const data = await res.json();
                    if (!data.reading) throw new Error("Няма разчитане");
                    setAiReading(data.reading);
                } catch (err) {
                    console.error("AI грешка:", err);
                    setAiError("Връзката с гадателя се разсея за момент. Опитайте отново — кредитът ви е върнат.");
                    setCredits(prev => prev + 1);
                } finally {
                    setAiLoading(false);
                }
            };

            const buyCredits = (amount) => {
                // Demo: в реално приложение тук се стартира In-App Purchase
                setCredits(prev => prev + amount);
                setShowPricingModal(false);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between p-4 pb-12">
                    <div>
                        {/* Header */}
                        <div className="flex justify-between items-center py-4 border-b border-purple-900/50 mb-6">
                            <div className="flex items-center space-x-2">
                                <i className="fa-solid fa-gem font-cinzel text-amber-400 text-2xl"></i>
                                <h1 className="font-cinzel text-xl font-bold tracking-wider gold-gradient-text">
                                    АСТРАЛ ТАРО
                                </h1>
                            </div>
                            <button
                                onClick={() => setShowPricingModal(true)}
                                className="bg-purple-950/80 hover:bg-purple-900 gold-border px-3 py-1.5 rounded-full text-xs flex items-center space-x-1.5 transition"
                            >
                                <span className="text-amber-400 font-bold">€</span>
                                <span className="text-purple-200">{credits} Кредита</span>
                                <i className="fa-solid fa-plus text-amber-400 text-[10px] ml-1"></i>
                            </button>
                        </div>

                        {/* Input & Options */}
                        <div className="bg-purple-950/30 backdrop-blur-md p-5 rounded-2xl border border-purple-800/40 purple-glow mb-6">
                            <label className="block text-xs font-semibold text-purple-300 uppercase tracking-widest mb-2">
                                <i className="fa-solid fa-wand-magic-sparkles text-amber-400 mr-1"></i> Задайте вашия въпрос
                            </label>
                            <textarea
                                value={question}
                                onChange={(e) => setQuestion(e.target.value)}
                                placeholder="Напр.: Какво предстои в кариерата ми през следващите месеци?"
                                className="w-full bg-slate-950/70 border border-purple-900/80 rounded-xl p-3 text-sm text-purple-100 placeholder-purple-400/50 focus:outline-none focus:border-amber-400/80 transition resize-none h-20 mb-4"
                            ></textarea>

                            <div className="grid grid-cols-2 gap-2 mb-4">
                                <button
                                    onClick={() => setReadingType("1_card")}
                                    className={`py-2 px-3 rounded-xl text-xs font-medium border transition ${
                                        readingType === "1_card"
                                            ? "bg-amber-400/15 border-amber-400 text-amber-300"
                                            : "bg-purple-900/20 border-purple-800/40 text-purple-300 hover:bg-purple-900/40"
                                    }`}
                                >
                                    <i className="fa-solid fa-square mr-1"></i> 1 Карта (Бърз съвет)
                                </button>
                                <button
                                    onClick={() => setReadingType("3_cards")}
                                    className={`py-2 px-3 rounded-xl text-xs font-medium border transition ${
                                        readingType === "3_cards"
                                            ? "bg-amber-400/15 border-amber-400 text-amber-300"
                                            : "bg-purple-900/20 border-purple-800/40 text-purple-300 hover:bg-purple-900/40"
                                    }`}
                                >
                                    <i className="fa-solid fa-table-cells-large mr-1"></i> 3 Карти (Подредба)
                                </button>
                            </div>

                            <button
                                onClick={handleDrawCards}
                                disabled={loading || aiLoading}
                                className="w-full py-3.5 rounded-xl bg-gradient-to-r from-amber-500 via-amber-400 to-yellow-600 text-slate-950 font-bold font-cinzel tracking-wider text-sm shadow-lg hover:brightness-110 active:scale-[0.99] transition flex justify-center items-center space-x-2 disabled:opacity-60"
                            >
                                {loading ? (
                                    <span><i className="fa-solid fa-circle-notch fa-spin mr-2"></i> Разбъркване...</span>
                                ) : aiLoading ? (
                                    <span><i className="fa-solid fa-circle-notch fa-spin mr-2"></i> Гадателят тълкува...</span>
                                ) : (
                                    <span><i className="fa-solid fa-wand-magic-sparkles mr-2"></i> ИЗТЕГЛИ КАРТИТЕ</span>
                                )}
                            </button>
                        </div>

                        {/* Cards Display */}
                        {drawnCards.length > 0 && (
                            <div className="mb-8">
                                <h3 className="text-center font-cinzel text-xs text-amber-300/80 uppercase tracking-widest mb-4">
                                    Вашите изтеглени карти
                                </h3>
                                <div className={`grid ${drawnCards.length === 1 ? 'grid-cols-1 max-w-[140px] mx-auto' : 'grid-cols-3'} gap-3`}>
                                    {drawnCards.map((card, idx) => (
                                        <div key={card.id} className="h-44 card-container">
                                            <div className={`card-inner ${isFlipped[idx] ? 'flipped' : ''}`}>
                                                <div className="card-front bg-gradient-to-br from-indigo-950 via-purple-950 to-slate-950 border-2 border-amber-400/60 flex flex-col justify-center items-center p-2 shadow-xl">
                                                    <div className="w-full h-full border border-purple-500/30 rounded-lg flex flex-col justify-center items-center bg-purple-900/20">
                                                        <i className="fa-solid fa-eye text-amber-400/70 text-xl mb-1 animate-pulse"></i>
                                                        <span className="font-cinzel text-[10px] text-purple-300">ТАРО</span>
                                                    </div>
                                                </div>
                                                <div className="card-back bg-gradient-to-b from-slate-900 to-purple-950 border-2 border-amber-400 p-2 flex flex-col justify-between items-center gold-glow">
                                                    <div className="w-full flex justify-between items-center">
                                                        <span className="text-xs text-amber-400/80 font-cinzel">
                                                            {readingType === "3_cards" ? (idx === 0 ? "Минало" : idx === 1 ? "Настояще" : "Бъдеще") : "Отговор"}
                                                        </span>
                                                        {card.reversed && (
                                                            <i className="fa-solid fa-arrows-rotate text-rose-400 text-[10px]" title="Обърната"></i>
                                                        )}
                                                    </div>
                                                    <div className={`text-3xl my-1 transition-transform ${card.reversed ? 'rotate-180' : ''}`}>{card.symbol}</div>
                                                    <div className="text-center">
                                                        <h4 className="font-cinzel font-bold text-xs text-amber-200 leading-tight">{card.name}</h4>
                                                        <p className="text-[9px] text-purple-300/70 mt-0.5">{card.arcana}</p>
                                                        <span className={`inline-block mt-1 text-[8px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded ${card.reversed ? 'bg-rose-500/20 text-rose-300' : 'bg-emerald-500/15 text-emerald-300'}`}>
                                                            {card.reversed ? 'Обърната' : 'Изправена'}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* AI loading placeholder */}
                        {aiLoading && (
                            <div className="bg-purple-950/40 border border-purple-800/40 rounded-2xl p-6 text-center mb-8 animate-fade-in">
                                <i className="fa-solid fa-hat-wizard text-amber-400 text-2xl mb-2 animate-pulse"></i>
                                <p className="text-xs text-purple-200">Гадателят се вглежда в картите ви и подготвя разчитането...</p>
                            </div>
                        )}

                        {/* AI error */}
                        {aiError && !aiLoading && (
                            <div className="bg-red-950/40 border border-red-500/40 rounded-2xl p-4 text-center mb-8 animate-fade-in">
                                <p className="text-xs text-red-200 mb-3">{aiError}</p>
                                <button
                                    onClick={() => generateAiResponse(drawnCards, question, readingType)}
                                    className="text-xs bg-amber-400 text-slate-950 font-bold px-4 py-2 rounded-lg"
                                >
                                    Опитай отново
                                </button>
                            </div>
                        )}

                        {/* AI Reading */}
                        {aiReading && !aiLoading && (
                            <div className="bg-gradient-to-b from-purple-950/60 to-slate-950/80 border border-amber-400/40 rounded-2xl p-5 gold-glow animate-fade-in mb-8">
                                <div className="text-center border-b border-purple-800/50 pb-3 mb-4">
                                    <span className="text-[10px] uppercase font-bold tracking-widest text-amber-400">AI Таро Разчитане</span>
                                    <h2 className="font-cinzel text-lg font-bold text-amber-200 mt-0.5">{aiReading.title}</h2>
                                </div>

                                {aiReading.intro && (
                                    <p className="text-xs text-purple-200 leading-relaxed italic mb-4">
                                        "{aiReading.intro}"
                                    </p>
                                )}

                                {aiReading.cardsDetail && (
                                    <div className="space-y-3 mb-4">
                                        {aiReading.cardsDetail.map((item, index) => (
                                            <div key={index} className="bg-purple-900/30 p-2.5 rounded-lg border border-purple-800/40 text-xs">
                                                <span className="font-semibold text-amber-300">{item.pos}: {item.name}</span>
                                                <p className="text-purple-200/90 mt-1">{item.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {aiReading.synthesis && (
                                    <div className="mb-4">
                                        <h4 className="font-cinzel text-xs font-bold text-amber-300 uppercase mb-1">Синтез на Енергията</h4>
                                        <p className="text-xs text-purple-100 leading-relaxed" dangerouslySetInnerHTML={{ __html: aiReading.synthesis.replace(/\*\*(.*?)\*\*/g, '<strong class="text-amber-200">$1</strong>') }}></p>
                                    </div>
                                )}

                                {aiReading.advice && (
                                    <div className="bg-amber-400/10 border-l-2 border-amber-400 p-3 rounded-r-lg">
                                        <h4 className="font-cinzel text-xs font-bold text-amber-300 uppercase mb-0.5">Ключов Съвет</h4>
                                        <p className="text-xs text-amber-100 italic">{aiReading.advice}</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Footer / Disclaimer */}
                    <div className="text-center mt-6 pt-4 border-t border-purple-950 text-[10px] text-purple-400/60">
                        <p>Приложението и неговите генерирани отговори са предназначени единствено за развлекателни и информационни цели. Приложението не предоставя медицински, правни, финансови или психотерапевтични съвети.</p>
                        <div className="mt-2 space-x-3">
                            <a href="#" className="underline hover:text-amber-400/80">Политика за поверителност</a>
                            <a href="#" className="underline hover:text-amber-400/80">Условия за ползване</a>
                        </div>
                    </div>

                    {/* Pricing Modal */}
                    {showPricingModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-amber-400/50 rounded-2xl p-6 max-w-xs w-full purple-glow relative">
                                <button
                                    onClick={() => setShowPricingModal(false)}
                                    className="absolute top-3 right-3 text-purple-400 hover:text-white text-lg"
                                >
                                    <i className="fa-solid fa-xmark"></i>
                                </button>

                                <div className="text-center mb-5">
                                    <i className="fa-solid fa-wand-magic-sparkles text-amber-400 text-3xl mb-2"></i>
                                    <h3 className="font-cinzel text-lg font-bold text-amber-200">Вземете Още Кредити</h3>
                                    <p className="text-xs text-purple-300 mt-1">Отключете дълбоки AI Таро разчитания за въпросите си.</p>
                                </div>

                                <div className="space-y-3 mb-4">
                                    <div className="bg-purple-950/60 border border-purple-800 p-3 rounded-xl flex justify-between items-center hover:border-amber-400 transition cursor-pointer" onClick={() => buyCredits(3)}>
                                        <div>
                                            <div className="text-xs font-bold text-purple-100">Пакет „Старт"</div>
                                            <div className="text-[10px] text-purple-400">3 Гледания (Кредита)</div>
                                        </div>
                                        <div className="bg-amber-400 text-slate-950 text-xs font-bold px-3 py-1.5 rounded-lg">€0.99</div>
                                    </div>

                                    <div className="bg-purple-950/60 border-2 border-amber-400/80 p-3 rounded-xl flex justify-between items-center relative overflow-hidden cursor-pointer" onClick={() => buyCredits(10)}>
                                        <div className="absolute top-0 right-0 bg-amber-400 text-slate-950 text-[8px] font-bold px-2 py-0.5 rounded-bl">ПОПУЛЯРЕН</div>
                                        <div>
                                            <div className="text-xs font-bold text-amber-200">Пакет „Мистик"</div>
                                            <div className="text-[10px] text-purple-300">10 Гледания (Кредита)</div>
                                        </div>
                                        <div className="bg-amber-400 text-slate-950 text-xs font-bold px-3 py-1.5 rounded-lg">€1.99</div>
                                    </div>

                                    <div className="bg-purple-950/60 border border-purple-800 p-3 rounded-xl flex justify-between items-center hover:border-amber-400 transition cursor-pointer" onClick={() => buyCredits(999)}>
                                        <div>
                                            <div className="text-xs font-bold text-purple-100">VIP Абонамент</div>
                                            <div className="text-[10px] text-purple-400">Неограничен достъп</div>
                                        </div>
                                        <div className="bg-amber-400 text-slate-950 text-xs font-bold px-3 py-1.5 rounded-lg">€3.99/мес</div>
                                    </div>
                                </div>

                                <button
                                    onClick={() => { alert('Възстановяване на покупки... (свързва се с App Store / Google Play в реалното приложение)'); }}
                                    className="w-full text-[11px] text-purple-300 hover:text-amber-300 underline mb-3"
                                >
                                    Възстанови покупки
                                </button>

                                <p className="text-[9px] text-center text-purple-400/70">
                                    Плащанията се обработват сигурно чрез App Store / Google Play (In-App Purchase). Абонаментът се подновява автоматично, докато не бъде отказан.
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TarotApp />);
    </script>
</body>
</html>
